name: PlatformIO CI

# Controls when the workflow will run
# on:
#   # Triggers the workflow on push or pull request events but only for the "master" branch
#   push:
#     branches: [ "master" ]

# Triggers on all push to all branches EXCEPT docs_site (since that's an orphan branch, for resources and GitHub Pages)
# Also Triggers on all tags beginning "v*"
# In combination, the "branches" and "tags" filters behave like OR rules, not AND rules.
on:
  push:
    branches:
      - "**"
      - "!docs_site"
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: make release folder
        shell: bash
        run: mkdir for_release
          
      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Work around missing intelhex package in some versions of tool-esptool
        run: pip install intelhex

      - name: Build PlatformIO Project
        run: pio run -v

      - name: move releaseable files for each platform
        shell: bash
        run: find . -regextype posix-basic -regex './.pio/build/\(.*\)/.*\.\(hex\|bin\)$' -print | grep -v '_test_' | sed s':\(./.pio/build/\)\([^/]*\)/\(.*\):echo copying \2_\3 \&\& cp .pio/build/\2/\3 for_release/\2_\3:' | bash

      - name: archive releasable files as output
        uses: actions/upload-artifact@v7
        with:
          name: releaseable-files
          path: |
            for_release/*

  cli-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install MinGW cross-compiler
        run: sudo apt-get install -y g++-mingw-w64-x86-64
      - name: Build CLI (Linux)
        run: make -C cli
      - name: Build CLI (Windows)
        run: make -C cli win
      - name: Upload CLI binaries
        uses: actions/upload-artifact@v7
        with:
          name: maxduino-cli
          path: |
            cli/build/maxduino
            cli/build/maxduino.exe
            cli/build/maxduinobatch.sh

  test:
    runs-on: ubuntu-latest
    needs: [cli-build]
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}

      - name: Checkout test-cases-resources branch
        uses: actions/checkout@v7
        with:
          ref: test-cases-resources
          path: testing

      - name: pull CLI binary
        uses: actions/download-artifact@v8
        with:
          name: maxduino-cli
          path: testing

      - name: Run tests
        shell: bash
        run: |
          MAXDUINO=testing/maxduino
          INPUT_DIR=testing/test/inputs
          MATCH_DIR=testing/test/outputs
          OUTPUT_DIR=/tmp/maxduino-testing-outputs

          mkdir -p "$OUTPUT_DIR"
          chmod +x ./cli/build/maxduinobatch.sh
          chmod +x "$MAXDUINO"
          echo "Running tests with maxduinobatch.sh: $MAXDUINO $INPUT_DIR $OUTPUT_DIR $MATCH_DIR"
          ./cli/build/maxduinobatch.sh -p "$MAXDUINO" "$INPUT_DIR" "$OUTPUT_DIR" "$MATCH_DIR" 2>&1

      - name: Upload outputs for debugging
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-outputs
          path: /tmp/maxduino-testing-outputs/*

  latest-dev-build:
    runs-on: ubuntu-latest

    needs:
      - build
      - cli-build
      - test

    steps:
      # download archive (just created by build process)
      - name: pull releasable files
        uses: actions/download-artifact@v8
        with:
          name: releaseable-files
          path: for_release

      - name: pull CLI binary
        uses: actions/download-artifact@v8
        with:
          name: maxduino-cli
          path: for_release

      # create release bundle but only if this commit was in master branch
      - uses: "marvinpinto/action-automatic-releases@latest"
        if: ${{ (github.ref_name == 'master') }}
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          is_tag_static: true
          prerelease: true
          title: "Development Build"
          files: |
            for_release/*

      # create test version of release bundle but only if this commit was in actions_experiments branch
      - uses: "marvinpinto/action-automatic-releases@latest"
        if: ${{ (github.ref_name == 'actions_experiments') }}
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest-actions-test"
          prerelease: true
          draft: true
          title: "Development Build (ACTIONS TEST)"
          files: |
            for_release/*

  tagged-release-draft:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build
      - cli-build
      - test

    steps:
      # download archive (just created by build process)
      - name: pull releasable files
        uses: actions/download-artifact@v8
        with:
          name: releaseable-files
          path: for_release

      - name: pull CLI binary
        uses: actions/download-artifact@v8
        with:
          name: maxduino-cli
          path: for_release

      - uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          is_tag_static: false
          prerelease: true
          draft: true
          files: |
            for_release/*
