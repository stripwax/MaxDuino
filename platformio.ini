; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = ./MaxDuino

[common]
lib_deps = 
	greiman/SdFat@^2.2.3
	https://github.com/felias-fogg/SoftI2CMaster.git#5e7ac22
extra_scripts = 
	pre:extra_script.py

[env:seeed_xiao]
platform = atmelsam
board = seeed_xiao
framework = arduino
lib_ignore = USBHost
lib_deps = ${common.lib_deps}
build_flags = 
	-DUSE_TINYUSB
	-I "${PROJECT_CORE_DIR}/packages/framework-arduino-samd-seeed/libraries/Adafruit_TinyUSB_Arduino/src/arduino"
extra_scripts = ${common.extra_scripts}

[env:Nano328p_OLED_096]
; for both regular (0.96") and 2XL screens (2.4"), as the
; OLED controllers are compatible with each other
framework = arduino
platform = atmelavr
board = nanoatmega328
lib_deps = ${common.lib_deps}
extra_scripts = ${common.extra_scripts}
build_flags =
	-DCONFIGFILE=7

[env:Nano328p_OLED_13]
; for XL (1.3") screens (2.4"), as the OLED controllers are different
framework = arduino
platform = atmelavr
board = nanoatmega328
lib_deps = ${common.lib_deps}
extra_scripts = ${common.extra_scripts}
build_flags =
	-DCONFIGFILE=7

[env:Nano328p_LCD16]
framework = arduino
platform = atmelavr
board = nanoatmega328
lib_deps = ${common.lib_deps}
extra_scripts = ${common.extra_scripts}
build_flags =
	-DCONFIGFILE=0

[env:Nano328p_Miniduino_Ampli_AVILLENA]
; For A.Villena's Miniduino new design
; Miniduino devices all have 0.96" OLED
framework = arduino
platform = atmelavr
board = nanoatmega328
lib_deps = ${common.lib_deps}
extra_scripts = ${common.extra_scripts}
build_flags =
	-DCONFIGFILE=AMPLI
	-DHARDWAREPROFILE=MINIDUINO_AMPLI
  	;-DMINIDUINO_AMPLI=1

