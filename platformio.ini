[env:ThinaryNanoEvery_MaxduinoUltimate]
framework = arduino
platform = atmelmegaavr
board = ATmega4808
board_build.f_cpu = 16000000L
board_hardware.oscillator = internal
board_build.variant = nano-4808
lib_deps = ${common.lib_deps}
extra_scripts = ${common.extra_scripts}
build_flags =
	-DPIO_EVERY_BUILD=1
	-flto
	-mcall-prologues
	-Wl,--relax
	-fshort-enums
	-fmerge-all-constants
	-fno-threadsafe-statics
	-fno-use-cxa-atexit
	-fno-rtti
	-fno-exceptions
	-DENABLE_DEDICATED_SPI=0
	-DUSE_FAT_FILE_FLAG_CONTIGUOUS=0
	-DCHECK_FLASH_PROGRAMMING=0
build_unflags =
	-fno-lto

[env:NanoEvery_MaxduinoUltimate]
framework = arduino
platform = atmelmegaavr
board = ATmega4809
board_build.f_cpu = 16000000L
board_hardware.oscillator = internal
board_build.variant = nano-every
lib_deps = ${common.lib_deps}
extra_scripts = ${common.extra_scripts}
build_flags =
	-DPIO_EVERY_BUILD=1
	-flto
	-mcall-prologues
	-Wl,--relax
	-fshort-enums
	-fmerge-all-constants
	-fno-threadsafe-statics
	-fno-use-cxa-atexit
	-fno-rtti
	-fno-exceptions
	-DENABLE_DEDICATED_SPI=0
	-DUSE_FAT_FILE_FLAG_CONTIGUOUS=0
	-DCHECK_FLASH_PROGRAMMING=0
build_unflags =
	-fno-lto

[env:ArduinoNanoEvery]
framework = arduino
platform = atmelmegaavr
board = ATmega4809
board_build.mcu = atmega4809
board_build.f_cpu = 16000000L
board_hardware.oscillator = internal
board_build.variant = nano-every
upload_protocol = jtag2updi
lib_deps = ${common.lib_deps}
extra_scripts = ${common.extra_scripts}
board_upload.use_1200bps_touch = yes
board_upload.wait_for_upload_port = yes
build_flags =
	-DPIO_EVERY_BUILD=1
	-flto
	-mcall-prologues
	-Wl,--relax
	-fshort-enums
	-fmerge-all-constants
	-fno-threadsafe-statics
	-fno-use-cxa-atexit
	-fno-rtti
	-fno-exceptions
	-DENABLE_DEDICATED_SPI=0
	-DUSE_FAT_FILE_FLAG_CONTIGUOUS=0
	-DCHECK_FLASH_PROGRAMMING=0
build_unflags =
	-fno-lto
[env:wemos_d1_mini8266]
framework = arduino
platform = espressif8266
board = d1_mini
lib_deps = ${common.lib_deps}
	jwrw/ESP_EEPROM@^2.2.1
extra_scripts = ${common.extra_scripts}

[env:ESP32C3]
framework = arduino
platform = espressif32
board = seeed_xiao_esp32c3
