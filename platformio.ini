; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = ./MaxDuino

[common]
lib_deps = 
	greiman/SdFat@^2.2.3
	https://github.com/felias-fogg/SoftI2CMaster.git#5e7ac22
extra_scripts = 
	pre:extra_script.py

[env:seeed_xiao]
platform = atmelsam
board = seeed_xiao
framework = arduino
lib_ignore = USBHost
lib_deps = ${common.lib_deps}
build_flags = 
	-DUSE_TINYUSB
	-I "${PROJECT_CORE_DIR}/packages/framework-arduino-samd-seeed/libraries/Adafruit_TinyUSB_Arduino/src/arduino"
extra_scripts = ${common.extra_scripts}

[env:Nano328p]
framework = arduino
platform = atmelavr
board = nanoatmega328
lib_deps = ${common.lib_deps}
extra_scripts = ${common.extra_scripts}
build_flags =
	-DCONFIGFILE=7
	-flto
	-mcall-prologues
	-fshort-enums
	-fno-threadsafe-statics
	-fno-use-cxa-atexit
	-fno-rtti
	-fno-exceptions
	-DENABLE_DEDICATED_SPI=0
	-DUSE_FAT_FILE_FLAG_CONTIGUOUS=0
	-DCHECK_FLASH_PROGRAMMING=0
	-DENABLE_DEDICATED_SPI=0
	-DUSE_FAT_FILE_FLAG_CONTIGUOUS=0
	-DCHECK_FLASH_PROGRAMMING=0
build_unflags =
	-fno-lto

[env:Nano328p_LCD16]
framework = arduino
platform = atmelavr
board = nanoatmega328
lib_deps = ${common.lib_deps}
extra_scripts = ${common.extra_scripts}
